
<!DOCTYPE html>
<html>
<head>
  <title>CSS UNITS EXAMPLE</title>
</head>
<body> 
    <h1>CSS UNITS</h1>
    
      <p>Absolute Units</p>
      <pre>centemeter</pre>
      <pre1>millimeter</pre1>
      <style>
        h1{
      color: rgb(172, 58, 77)
    }
         p{
      font-size:20px;
      color: rgb(109, 28, 129)
    }
    pre{
      font-size:2cm;
    }
    pre1{
      font-size:20mm;
    }
      </style>
      <h2>Relative Units</h2>
      <p> %=percentage of parent element</p>
      <pre1>em=based on parent element's font size</pre1><br>
      <pre2>rem=based on root (html) font size </pre2><br>
      <pre3>vh=1% of the viewport's height</pre3><br>
      <pre4>vw=1% of the viewport's width</pre4><br>
      <style>
        p{
            font-size:70%;
            color: rgb(109, 28, 129)
        }
        pre1{
          font-size:2em;
        }
        pre2{
          font-size:2rem;
        }
        pre3{
          font-size:10vh;
        }
        pre4{
          font-size:1vw;
        } 
      </style>

</body>
</html>
