    <script>
      let name1 = "arithmetic operators";
      console.log(name1);
      let a = 10;
      let b = 5;
      console.log(a + b);
      console.log(a - b);
      console.log(a * b);
      console.log(a / b);
      console.log(a % b);

      let name2 = "assignment operators";
      console.log(name2);
      let x = 10;

      x **= 5; // x=x+5

      console.log(x);

      let name3 = "increment & decrement operators";
      console.log(name3);
      let y = 10;

      // --a; ++a; anoter method

      console.log(y++);
      console.log(y);

      let name4 = "comparison operators";
      console.log(name4);
      let c = 10;
      let d = "10";

      console.log(c == d);
      console.log(c === d); //three equal symbols mean check equal value, variabl and data
      console.log(c > 5);
      console.log(c < 5);
      console.log(c != d); //!= checks if two values are not equal It compares only value, not data type Because values are equal (10 == "10")
      console.log(c !== d); //checks if two values are not equal OR not same type It compares value + data type Because number ≠ string

      console.log(c >= d);
      console.log(c <= d);

      let name5 = "logical operators";
      console.log(name5);
      let e = 10;

      console.log(e > 10 && e < 20);    //how is AND operator works if two condition in one condition fasle o/p is false then tow condition true o/p true and then two condition false o/p is false
      console.log(e > 20 || e < 15);  //OR operator how is working if two condition in one condition be true or false o/p true and  two condition false o/p false
      console.log(!(e > 5)); //NOT operators if condition false o/p true and condition true o/p false
    </script>
